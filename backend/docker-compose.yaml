services:
  db:
    image: mysql:8.4
    container_name: asan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: asan_app
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asan-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: your_password
      DB_NAME: asan_app
      DB_PORT: 3306
      SESSION_SECRET: asan_session_secret
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
